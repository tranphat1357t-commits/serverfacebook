<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý tài khoản Facebook</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 700px;
  margin: auto;
}
h2, h3 {
  text-align: center;
}
input {
  padding: 12px;
  margin: 6px 0;
  width: 100%;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}
button {
  background: #2563eb;
  color: white;
  cursor: pointer;
  padding: 10px;
  font-size: 13px;
  border-radius: 8px;
  border: none;
  transition: 0.2s;
}
button:hover {
  opacity: 0.85;
}
.account {
  background: #1e293b;
  padding: 15px;
  margin-top: 12px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.account-info {
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
}
.actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.used {
  background: #16a34a;
}
.delete {
  background: #ef4444;
}
@media (min-width: 768px) {
  .account {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  .account-info {
    flex: 1;
  }
  .actions {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .actions button {
    min-width: 100px;
  }
}
</style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
  <div class="top-name">
  𝐍𝐠𝐮𝐲𝐞̂̃𝐧 𝐃𝐢̀𝐧𝐡 𝐐𝐮𝐚̂𝐧 (𝐁𝐫𝐢𝐚𝐧 𝐂𝐡𝐞𝐚𝐭 𝐈𝐎𝐒)
  </div>
<div class="container">
  <h2>Lưu tài khoản Facebook</h2>
  <input id="email" placeholder="Tài khoản">
  <input id="password" placeholder="Mật khẩu">
  <button onclick="saveAccount()">Lưu</button>
  <h3>
  Lịch sử (
  Tổng: <span id="total">0</span> |
  Đã dùng: <span id="usedCount">0</span>
  )
</h3>
  <div id="list"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyDS9CIoprI_iFq57dl55edM-_nLuxDYW14",
  authDomain: "taikhoanfb-b011b.firebaseapp.com",
  projectId: "taikhoanfb-b011b"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.saveAccount = async function () {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if (!email || !password) {
      alert("Nhập đầy đủ!");
      return;
    }
    await addDoc(collection(db, "accounts"), {
      email: email,
      password: password,
      used: false,
      time: new Date()
    });
    console.log("Đã lưu thành công");
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
  } catch (err) {
    console.error("Lỗi khi lưu:", err);
    alert("Lỗi lưu dữ liệu (xem console)");
  }
};
import { query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
function loadAccounts() {
  const list = document.getElementById("list");
  const q = query(
    collection(db, "accounts"),
    orderBy("time", "desc")
  );
  onSnapshot(q, (snapshot) => {
  list.innerHTML = "";
  let used = 0;
  document.getElementById("total").innerText = snapshot.size;
  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    if (data.used) used++;
    const div = document.createElement("div");
    div.className = "account";
   div.innerHTML = `
  <div class="account-info">
  <b>Tài khoản:</b> ${data.email}<br>
  <b>Mật khẩu:</b> 
  <span id="pw-${docSnap.id}">******</span>
</div>
  <div style="display:flex; gap:6px; align-items:center;">
    <button onclick="copyText('${data.email}')">Copy TK</button>
    <button onclick="copyText('${data.password}')">Copy MK</button>

    <button onclick="togglePassword('${docSnap.id}', '${data.password}')">
      Hiện
    </button>

    <button class="${data.used ? 'used' : ''}" onclick="markUsed('${docSnap.id}')">
      ${data.used ? 'Đã dùng' : 'Đánh dấu'}
    </button>

    <button onclick="deleteAccount('${docSnap.id}')" style="background:red;">
      Xóa
    </button>
  </div>
`;
    list.appendChild(div);
  });
  document.getElementById("usedCount").innerText = used;
  });
}
window.markUsed = async function (id) {
  try {
    const ref = doc(db, "accounts", id);
    await updateDoc(ref, {
      used: true
    });
    console.log("Đã update:", id);
    loadAccounts();
  } catch (err) {
    console.error("Lỗi update:", err);
    alert(err.message);
  }
};
window.copyText = function(text) {
  navigator.clipboard.writeText(text);
  alert("Đã copy: " + text);
}
window.togglePassword = function(id, password) {
  const el = document.getElementById("pw-" + id);

  if (!el) return;

  if (el.innerText === "******") {
    el.innerText = password;
  } else {
    el.innerText = "******";
  }
};
window.deleteAccount = async function (id) {
  const confirmDelete = confirm("Bạn có chắc muốn xóa tài khoản này?");
  if (!confirmDelete) return;

  try {
    await deleteDoc(doc(db, "accounts", id));
    console.log("Đã xóa:", id);
  } catch (err) {
    console.error("Lỗi xóa:", err);
    alert(err.message);
  }
};
loadAccounts();
</script>
</body>
</html>
